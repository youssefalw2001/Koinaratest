name: GMGN route XSS fuzz

on:
  push:
    branches:
      - agent/gmgn-xss-route-fuzz
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser control library
        run: python -m pip install --disable-pip-version-check playwright

      - name: Map reflections with WAF-safe markers
        run: python gmgn_route_reflection_map.py

      - name: Upload structural report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-route-reflection-map
          path: gmgn_route_reflection_map.json
          if-no-files-found: error
          retention-days: 3
