name: Deploy Koinara Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      api_url:
        description: "Production API URL, example: https://koinara-api.up.railway.app"
        required: false
        default: "https://workspaceapi-server-production-4e16.up.railway.app"
        type: string
      base_path:
        description: "Frontend base path. Use /Koinaratest/ for GitHub Pages repo URL, or / for custom domain."
        required: false
        default: "/Koinaratest/"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  PROD_API_URL: https://workspaceapi-server-production-4e16.up.railway.app
  PROD_BASE_PATH: /Koinaratest/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve production inputs
        id: deploy-inputs
        run: |
          echo "api_url=${{ github.event.inputs.api_url || env.PROD_API_URL }}" >> "$GITHUB_OUTPUT"
          echo "base_path=${{ github.event.inputs.base_path || env.PROD_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=github-pages-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck non-blocking
        continue-on-error: true
        env:
          PORT: 5173
          BASE_PATH: ${{ steps.deploy-inputs.outputs.base_path }}
          VITE_API_URL: ${{ steps.deploy-inputs.outputs.api_url }}
          VITE_KOINARA_TON_WALLET: ${{ secrets.KOINARA_TON_WALLET }}
          VITE_TON_WALLET: ${{ secrets.KOINARA_TON_WALLET }}
        run: pnpm run typecheck

      - name: Build frontend
        env:
          NODE_ENV: production
          PORT: 5173
          BASE_PATH: ${{ steps.deploy-inputs.outputs.base_path }}
          VITE_API_URL: ${{ steps.deploy-inputs.outputs.api_url }}
          VITE_KOINARA_TON_WALLET: ${{ secrets.KOINARA_TON_WALLET }}
          VITE_TON_WALLET: ${{ secrets.KOINARA_TON_WALLET }}
        run: pnpm --filter @workspace/koinara run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ steps.deploy-inputs.outputs.artifact_name }}
          path: artifacts/alpha-predict-pro/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ steps.deploy-inputs.outputs.artifact_name }}
          timeout: "2400000"
          error_count: "120"
          reporting_interval: "30000"
