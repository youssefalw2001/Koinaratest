name: GMGN public XSS static recon

on:
  push:
    branches:
      - main
      - agent/gmgn-public-xss-recon
      - agent/gmgn-xss-deep-scan
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unauthenticated public frontend scan
        run: python gmgn_xss_static_recon.py

      - name: Print compact findings
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('xss_static_recon_report.json')
          if not path.exists():
              print('No report generated')
              raise SystemExit(0)
          report = json.loads(path.read_text())
          print(json.dumps({'root': report.get('root'), 'summary': report.get('summary'), 'manifest': report.get('manifest')}, indent=2))
          for bundle in report.get('bundles', []):
              if bundle.get('exact_endpoint_modules') or bundle.get('same_module_source_sink'):
                  print('\nBUNDLE', bundle.get('url'))
                  print('COUNTS', json.dumps(bundle.get('counts', {}), sort_keys=True))
                  for item in bundle.get('exact_endpoint_modules', [])[:10]:
                      print('EXACT_ENDPOINT_MODULE', json.dumps({k: item.get(k) for k in ('module_id','sources','sinks','sanitizers','module_bytes')}, sort_keys=True))
                  for item in bundle.get('same_module_source_sink', [])[:10]:
                      print('SAME_MODULE_SOURCE_SINK', json.dumps({k: item.get(k) for k in ('module_id','sources','sinks','sanitizers','module_bytes')}, sort_keys=True))
          PY

      - name: Upload structural report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-xss-static-recon
          path: xss_static_recon_report.json
          if-no-files-found: error
          retention-days: 3
