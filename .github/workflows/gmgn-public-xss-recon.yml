name: GMGN public XSS static recon

on:
  push:
    branches:
      - main
      - agent/gmgn-public-xss-recon
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unauthenticated public frontend scan
        run: python gmgn_xss_static_recon.py

      - name: Print compact findings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('xss_static_recon_report.json').read_text())
          print(json.dumps({'root': report['root'], 'summary': report['summary']}, indent=2))
          for bundle in report['bundles']:
              print('\nBUNDLE', bundle['url'])
              print('COUNTS', json.dumps(bundle['counts'], sort_keys=True))
              for finding in bundle['source_sink_proximity'][:10]:
                  print('PROXIMITY', json.dumps({k: finding[k] for k in ('source','sink','distance','sanitizers_in_window')}, sort_keys=True))
          PY

      - name: Upload structural report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-xss-static-recon
          path: xss_static_recon_report.json
          if-no-files-found: error
          retention-days: 3
