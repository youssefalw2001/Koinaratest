name: Deploy Koinara frontend

on:
  push:
    branches:
      - main
      - cursor/**
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (leave as-is for main)"
        required: true
        default: "main"

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        working-directory: artifacts/alpha-predict-pro
        env:
          PORT: "4173"
          BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Deploy static site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: artifacts/alpha-predict-pro/dist/public
          force_orphan: true

      - name: Show preview URL
        run: 'echo "Preview URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"'
