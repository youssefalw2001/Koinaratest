name: Deploy Koinara frontend

on:
  push:
    branches:
      - main
      - cursor/**
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (leave as-is for main)"
        required: true
        default: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Verify GitHub Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          API="https://api.github.com/repos/${REPO}/pages"

          status=$(curl -sS -o /tmp/pages_get.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")

          if [ "${status}" = "404" ]; then
            echo "::error::GitHub Pages is not enabled yet for this repository."
            echo "::error::Open Settings > Pages and set Source to 'GitHub Actions', then rerun this workflow."
            exit 1
          fi

          if [ "${status}" -ge 400 ]; then
            echo "::error::Failed to read GitHub Pages status (HTTP ${status})."
            echo "::error::Check repository permissions and Pages settings, then rerun."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        working-directory: artifacts/alpha-predict-pro
        env:
          PORT: "4173"
          BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/alpha-predict-pro/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show deployed URL
        run: 'echo "Preview URL: ${{ steps.deployment.outputs.page_url }}"'
