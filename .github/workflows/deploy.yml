name: Deploy Koinara frontend

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "claude/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (leave as-is for main)"
        required: true
        default: "main"

permissions:
  contents: write
  pages: read

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Verify Pages source is gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          API="https://api.github.com/repos/${REPO}/pages"
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")

          if [ "${status}" -ge 400 ]; then
            echo "::warning::Could not read Pages settings (HTTP ${status}) — skipping verification."
            echo "::warning::Ensure Settings > Pages > Source = 'Deploy from a branch', Branch = gh-pages."
            exit 0
          fi

          python3 - <<'PY'
          import json, sys
          with open("/tmp/pages.json", "r", encoding="utf-8") as f:
              pages = json.load(f)
          build_type = pages.get("build_type")
          source = pages.get("source") or {}
          branch = source.get("branch")
          path = source.get("path")
          # build_type may be "legacy" or "workflow" depending on GitHub's internal
          # representation of a branch-based deploy; only the source branch matters.
          if branch != "gh-pages":
              print("::error::Pages source branch is not gh-pages.")
              print("::error::Set Settings > Pages > Source = Deploy from a branch, Branch = gh-pages, Folder = /(root).")
              print(f"::error::Current build_type={build_type!r}, source.branch={branch!r}, source.path={path!r}")
              sys.exit(1)
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Validate optional VITE_API_URL secret
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "::warning::VITE_API_URL secret is not set. Frontend will use relative /api paths."
            exit 0
          fi

          case "${VITE_API_URL}" in
            http://*|https://*)
              echo "Using API base URL: ${VITE_API_URL}"
              ;;
            *)
              echo "::error::VITE_API_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Validate TON wallet frontend secrets
        env:
          VITE_TON_WALLET: ${{ secrets.VITE_TON_WALLET }}
          VITE_KOINARA_TON_WALLET: ${{ secrets.VITE_KOINARA_TON_WALLET }}
        run: |
          if [ -z "${VITE_TON_WALLET}" ]; then
            echo "::warning::VITE_TON_WALLET secret is not set. TC pack payments and Wallet fallback may show not configured."
          fi
          if [ -z "${VITE_KOINARA_TON_WALLET}" ]; then
            echo "::warning::VITE_KOINARA_TON_WALLET secret is not set. Wallet uses VITE_TON_WALLET fallback if present."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${DATABASE_URL}" ]; then
            pnpm --filter @workspace/api-server test --run
          else
            echo "::warning::DATABASE_URL secret not set. Running non-DB unit tests only."
            pnpm --filter @workspace/api-server exec vitest run \
              src/lib/__tests__/idempotency.test.ts \
              src/lib/__tests__/crashRuntime.test.ts \
              --reporter=verbose
          fi

      - name: Build frontend
        run: pnpm run build
        working-directory: artifacts/alpha-predict-pro
        env:
          PORT: "4173"
          BASE_PATH: "/${{ github.event.repository.name }}/"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TON_WALLET: ${{ secrets.VITE_TON_WALLET }}
          VITE_KOINARA_TON_WALLET: ${{ secrets.VITE_KOINARA_TON_WALLET }}

      - name: Add SPA refresh fallback
        run: cp artifacts/alpha-predict-pro/dist/public/index.html artifacts/alpha-predict-pro/dist/public/404.html

      - name: Deploy static site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: artifacts/alpha-predict-pro/dist/public
          force_orphan: true

      - name: Show preview URL
        run: 'echo "Preview URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"'
