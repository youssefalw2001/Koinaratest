name: Deploy Koinara frontend

on:
  push:
    branches:
      - main
      - cursor/**
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (leave as-is for main)"
        required: true
        default: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Ensure GitHub Pages is enabled
        id: ensure-pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          API="https://api.github.com/repos/${REPO}/pages"

          status=$(curl -sS -o /tmp/pages_get.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")

          if [ "${status}" = "404" ]; then
            echo "Pages site not found. Creating it first."
            create_status=$(curl -sS -o /tmp/pages_create.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API}" \
              -d '{"source":{"branch":"main","path":"/"}}')

            if [ "${create_status}" -ge 400 ]; then
              echo "Could not create Pages site automatically (HTTP ${create_status})."
            fi
          elif [ "${status}" -ge 400 ]; then
            echo "Could not read Pages site (HTTP ${status})."
          fi

          update_status=$(curl -sS -o /tmp/pages_update.json -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}" \
            -d '{"build_type":"workflow"}')

          if [ "${update_status}" -lt 400 ]; then
            echo "pages_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages_ready=false" >> "$GITHUB_OUTPUT"
            echo "Could not set Pages source to GitHub Actions automatically (HTTP ${update_status})."
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        working-directory: artifacts/alpha-predict-pro
        env:
          PORT: "4173"
          BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Configure GitHub Pages
        if: steps.ensure-pages.outputs.pages_ready == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.ensure-pages.outputs.pages_ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/alpha-predict-pro/dist/public

      - name: Deploy to GitHub Pages
        if: steps.ensure-pages.outputs.pages_ready == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show deployed URL
        if: steps.ensure-pages.outputs.pages_ready == 'true'
        run: 'echo "Preview URL: ${{ steps.deployment.outputs.page_url }}"'

      - name: Pages setup required
        if: steps.ensure-pages.outputs.pages_ready != 'true'
        run: |
          echo "Automatic Pages setup failed."
          echo "In GitHub: Settings > Pages > Source = GitHub Actions"
          exit 1
