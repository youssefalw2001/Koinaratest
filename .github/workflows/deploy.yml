name: Deploy Koinara frontend

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "claude/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (leave as-is for main)"
        required: true
        default: "main"

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Verify Pages source is gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          API="https://api.github.com/repos/${REPO}/pages"
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")

          if [ "${status}" -ge 400 ]; then
            echo "::error::Could not read Pages settings (HTTP ${status})."
            echo "::error::Open Settings > Pages and set Source to 'Deploy from a branch'."
            exit 1
          fi

          python3 - <<'PY'
          import json, sys
          with open("/tmp/pages.json", "r", encoding="utf-8") as f:
              pages = json.load(f)
          build_type = pages.get("build_type")
          source = pages.get("source") or {}
          branch = source.get("branch")
          path = source.get("path")
          if build_type == "workflow" or branch != "gh-pages":
              print("::error::Pages is not configured for branch deploy.")
              print("::error::Set Settings > Pages > Source = Deploy from a branch, Branch = gh-pages, Folder = /(root).")
              print(f"::error::Current build_type={build_type!r}, source.branch={branch!r}, source.path={path!r}")
              sys.exit(1)
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Validate VITE_API_URL secret
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "::error::Missing VITE_API_URL secret."
            echo "::error::Set repo secret VITE_API_URL to your deployed API base URL (for example https://api.example.com)."
            exit 1
          fi

          case "${VITE_API_URL}" in
            http://*|https://*)
              echo "Using API base URL: ${VITE_API_URL}"
              ;;
            *)
              echo "::error::VITE_API_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @workspace/api-server test --run

      - name: Build frontend
        run: pnpm run build
        working-directory: artifacts/alpha-predict-pro
        env:
          PORT: "4173"
          BASE_PATH: "/${{ github.event.repository.name }}/"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy static site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: artifacts/alpha-predict-pro/dist/public
          force_orphan: true

      - name: Show preview URL
        run: 'echo "Preview URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"'
