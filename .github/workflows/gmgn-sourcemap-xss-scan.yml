name: GMGN ECharts formatter analysis

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan application tooltip formatters
        run: python gmgn_echarts_formatter_scan.py

      - name: Upload formatter analysis
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-echarts-formatter-analysis
          path: gmgn_echarts_formatter_scan.json
          if-no-files-found: error
          retention-days: 3
