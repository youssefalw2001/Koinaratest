name: GMGN redirect dataflow scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trace redirect query flows
        run: python gmgn_redirect_dataflow_scan.py

      - name: Upload redirect report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-redirect-dataflow-report
          path: gmgn_redirect_dataflow_scan.json
          if-no-files-found: error
          retention-days: 3
