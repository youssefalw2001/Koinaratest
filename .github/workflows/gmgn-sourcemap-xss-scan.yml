name: GMGN Pump live URL survey

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Survey Pump detail URLs
        run: python gmgn_pump_url_survey.py

      - name: Upload Pump URL survey
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-pump-url-survey
          path: gmgn_pump_url_survey.json
          if-no-files-found: error
          retention-days: 3
