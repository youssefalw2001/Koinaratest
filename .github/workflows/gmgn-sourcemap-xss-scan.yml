name: GMGN community media producer trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate producer modules
        run: python gmgn_module_locator.py

      - name: Upload producer modules
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-community-producer-modules
          path: gmgn_community_producer_modules.json
          if-no-files-found: error
          retention-days: 3
