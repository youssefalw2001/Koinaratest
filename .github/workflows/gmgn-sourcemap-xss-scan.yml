name: GMGN AutoPauseVideo XSS trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trace AutoPauseVideo callers
        run: python gmgn_autopause_callsites.py

      - name: Print call-site summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('gmgn_autopause_callsites.json').read_text())
          print('scripts_fetched', report['scripts_fetched'])
          for hit in report['hits']:
              print('\nTERM', hit['term'], 'COUNT', hit['count'], 'SCRIPT', hit['script_url'])
              for ctx in hit['contexts'][:10]:
                  print(ctx['context'][:5000])
          PY

      - name: Upload call-site trace
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-autopause-callsites
          path: gmgn_autopause_callsites.json
          if-no-files-found: error
          retention-days: 3
