name: GMGN callout publish trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract callout publish module
        run: python gmgn_module_locator.py

      - name: Upload callout publish module
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-callout-publish-module
          path: gmgn_callout_publish_module.json
          if-no-files-found: error
          retention-days: 3
