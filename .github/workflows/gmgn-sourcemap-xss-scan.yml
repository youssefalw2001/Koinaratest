name: GMGN RainbowKit provider trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trace RainbowKit provider props
        run: python gmgn_rainbowkit_provider_trace.py

      - name: Upload RainbowKit trace
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-rainbowkit-provider-trace
          path: gmgn_rainbowkit_provider_trace.json
          if-no-files-found: error
          retention-days: 3
