name: GMGN Pump live URL trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trace Pump detail URL
        run: python gmgn_pump_url_trace.py

      - name: Upload Pump URL trace
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-pump-url-trace
          path: gmgn_pump_url_trace.json
          if-no-files-found: error
          retention-days: 3
