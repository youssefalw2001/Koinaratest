name: GMGN DOMPurify version trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract bundled DOMPurify
        continue-on-error: true
        run: |
          set -o pipefail
          python -m py_compile gmgn_dompurify_locator.py gmgn_dompurify_actual_locator.py
          python gmgn_dompurify_actual_locator.py 2>&1 | tee gmgn_dompurify_locator.log

      - name: Upload DOMPurify diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-dompurify-module
          path: |
            gmgn_dompurify_module.json
            gmgn_dompurify_locator.log
          if-no-files-found: warn
          retention-days: 3
