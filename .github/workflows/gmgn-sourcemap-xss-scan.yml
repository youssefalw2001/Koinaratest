name: GMGN public community media survey

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Survey public community media
        run: python gmgn_public_media_survey.py

      - name: Upload media survey
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-public-media-survey
          path: gmgn_public_media_survey.json
          if-no-files-found: error
          retention-days: 3
