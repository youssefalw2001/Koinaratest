name: GMGN postMessage receiver scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan public message receivers
        run: python gmgn_postmessage_receiver_scan.py

      - name: Upload receiver report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-postmessage-receiver-report
          path: gmgn_postmessage_receiver_scan.json
          if-no-files-found: error
          retention-days: 3
