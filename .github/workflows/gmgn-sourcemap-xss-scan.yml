name: GMGN DOMPurify version trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract bundled DOMPurify module
        run: |
          python -m py_compile gmgn_dompurify_direct_extract.py
          python gmgn_dompurify_direct_extract.py

      - name: Upload DOMPurify module
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-dompurify-direct-module
          path: gmgn_dompurify_direct_module.json
          if-no-files-found: error
          retention-days: 3
