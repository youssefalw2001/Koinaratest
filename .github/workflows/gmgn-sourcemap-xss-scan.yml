name: GMGN TokenSocial URL trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract TokenSocial URL flows
        continue-on-error: true
        run: |
          set -o pipefail
          python -m py_compile gmgn_tokensocial_extract.py
          python gmgn_tokensocial_extract.py 2>&1 | tee gmgn_tokensocial_extract.log

      - name: Upload TokenSocial diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-tokensocial-extract
          path: |
            gmgn_tokensocial_extract.json
            gmgn_tokensocial_extract.log
          if-no-files-found: warn
          retention-days: 3
