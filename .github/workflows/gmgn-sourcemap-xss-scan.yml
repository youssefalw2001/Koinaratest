name: GMGN Pump live hook trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract Pump hook module
        run: python gmgn_module_locator.py

      - name: Upload Pump hook module
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-pump-hook-module
          path: gmgn_pump_hook_module.json
          if-no-files-found: error
          retention-days: 3
