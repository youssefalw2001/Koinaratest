name: GMGN media URL flow scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan media URL mappings
        run: python gmgn_media_url_flow_scan.py

      - name: Upload media URL flow report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-media-url-flow-report
          path: gmgn_media_url_flow_scan.json
          if-no-files-found: error
          retention-days: 3
