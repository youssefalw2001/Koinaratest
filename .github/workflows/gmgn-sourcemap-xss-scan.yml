name: GMGN metadata URL sink scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan URL navigation sinks
        run: python gmgn_url_navigation_sink_scan.py

      - name: Upload navigation sink report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-url-navigation-sink-report
          path: gmgn_url_navigation_sink_scan.json
          if-no-files-found: error
          retention-days: 3
