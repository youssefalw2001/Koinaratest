name: GMGN live Pump media survey

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Survey live Pump community media
        run: python gmgn_live_pump_media_survey.py

      - name: Upload live Pump media survey
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-live-pump-media-survey
          path: gmgn_live_pump_media_survey.json
          if-no-files-found: error
          retention-days: 3
