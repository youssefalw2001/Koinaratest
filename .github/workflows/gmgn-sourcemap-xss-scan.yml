name: GMGN TokenSocial runtime trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate current TokenSocial runtime module
        run: python gmgn_tokensocial_runtime_locator.py

      - name: Upload TokenSocial runtime report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-tokensocial-runtime-report
          path: gmgn_tokensocial_runtime_locator.json
          if-no-files-found: error
          retention-days: 3
