name: GMGN SimulateLink metadata trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trace SimulateLink call sites
        run: python gmgn_simulatelink_callsites.py

      - name: Upload call-site report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-simulatelink-callsites
          path: gmgn_simulatelink_callsites.json
          if-no-files-found: error
          retention-days: 3
