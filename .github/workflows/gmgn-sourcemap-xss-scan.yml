name: GMGN AutoPauseVideo module trace

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract activity module
        run: python gmgn_activity_module_extract.py

      - name: Upload activity module
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-activity-module
          path: gmgn_activity_module_542550.json
          if-no-files-found: error
          retention-days: 3
