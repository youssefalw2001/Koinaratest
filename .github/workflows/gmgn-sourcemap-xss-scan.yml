name: GMGN public DOM XSS probe

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser runtime
        run: |
          python -m pip install --disable-pip-version-check playwright
          python -m playwright install --with-deps chromium

      - name: Run harmless DOM marker probe
        run: python gmgn_public_dom_probe.py

      - name: Upload DOM probe report
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-public-dom-probe
          path: gmgn_public_dom_probe.json
          if-no-files-found: error
          retention-days: 3
