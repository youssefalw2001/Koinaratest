name: GMGN public broadcast sample

on:
  push:
    branches:
      - agent/gmgn-public-broadcast-sample
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install WebSocket client
        run: python -m pip install --disable-pip-version-check websockets==12.0

      - name: Sample public broadcast URL classes
        run: python gmgn_public_broadcast_sample.py

      - name: Upload structural result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-public-broadcast-sample
          path: gmgn_public_broadcast_sample.json
          if-no-files-found: error
          retention-days: 3
