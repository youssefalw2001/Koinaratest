name: GMGN public broadcast sample

on:
  push:
    branches:
      - agent/gmgn-public-broadcast-sample
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser control library
        run: python -m pip install --disable-pip-version-check playwright

      - name: Observe GMGN browser WebSocket URL classes
        run: python gmgn_browser_broadcast_sample.py

      - name: Upload structural result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmgn-public-broadcast-browser-sample
          path: gmgn_browser_broadcast_sample.json
          if-no-files-found: error
          retention-days: 3
