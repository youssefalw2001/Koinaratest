kind = "web"
previewPath = "/"
title = "Koinara"
version = "1.0.0"
id = "artifacts/alpha-predict-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18745

[services.development]
run = "pnpm --filter @workspace/koinara run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/koinara", "run", "build" ]
publicDir = "artifacts/alpha-predict-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18745"
BASE_PATH = "/"
