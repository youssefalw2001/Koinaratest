openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Koinara API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: predictions
    description: Prediction operations
  - name: quests
    description: Quest/Earn Center operations
  - name: rewards
    description: Daily rewards and bonuses
  - name: gems
    description: Gem shop powerup operations
  - name: content
    description: VIP content rewards operations
  - name: withdrawals
    description: GC withdrawal queue operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register or login a user via Telegram ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "200":
          description: User registered or existing user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{telegramId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by Telegram ID
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{telegramId}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user stats (win rate, profit, streak, referrals)
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/{telegramId}/wallet:
    patch:
      operationId: updateWallet
      tags: [users]
      summary: Link TON wallet address to user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWalletBody"
      responses:
        "200":
          description: Wallet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{telegramId}/activate-trial:
    post:
      operationId: activateVipTrial
      tags: [users]
      summary: Activate a 24-hour VIP trial (TC=0, GC milestone, or referral trigger)
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateVipTrialBody"
      responses:
        "200":
          description: Trial activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Trial already used or not eligible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{telegramId}/vip/subscribe:
    post:
      operationId: upgradeToVip
      tags: [users]
      summary: Subscribe to VIP (deduct TC or verify on-chain TON payment)
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeToVipBody"
      responses:
        "200":
          description: VIP status granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Insufficient credits or already VIP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /predictions:
    post:
      operationId: createPrediction
      tags: [predictions]
      summary: Place a trade prediction (Long or Short) — deducts Trade Credits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePredictionBody"
      responses:
        "201":
          description: Prediction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "400":
          description: Insufficient Trade Credits or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /predictions/{id}/resolve:
    post:
      operationId: resolvePrediction
      tags: [predictions]
      summary: Resolve a prediction — awards Gold Coins on win
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolvePredictionBody"
      responses:
        "200":
          description: Prediction resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"

  /predictions/user/{telegramId}:
    get:
      operationId: getUserPredictions
      tags: [predictions]
      summary: Get recent predictions for a user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"

  /predictions/vip-activity:
    get:
      operationId: getVipActivity
      tags: [predictions]
      summary: Recent Gold Coin wins by VIP users (anonymized) for the FOMO ticker
      responses:
        "200":
          description: VIP activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVipActivityResponse"

  /predictions/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [predictions]
      summary: Get top players by Gold Coins earned
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /quests:
    get:
      operationId: listQuests
      tags: [quests]
      summary: List all available quests
      responses:
        "200":
          description: List of quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"

  /quests/{id}/claim:
    post:
      operationId: claimQuest
      tags: [quests]
      summary: Claim Trade Credits reward for completing a quest
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimQuestBody"
      responses:
        "200":
          description: Quest claimed, Trade Credits awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimQuestResponse"
        "400":
          description: Already claimed or quest not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rewards/ad-status/{telegramId}:
    get:
      operationId: getAdStatus
      tags: [rewards]
      summary: Get today's ad watch count and remaining cap for a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ad status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdStatusResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rewards/ad:
    post:
      operationId: watchAd
      tags: [rewards]
      summary: Record a rewarded ad watch and credit Trade Credits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchAdBody"
      responses:
        "200":
          description: Ad reward credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchAdResponse"
        "400":
          description: Daily ad cap reached or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals/verify-fee:
    post:
      operationId: verifyWithdrawalFee
      tags: [withdrawals]
      summary: Confirm one-time identity verification TON payment (sets hasVerified=true)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyFeeBody"
      responses:
        "200":
          description: Verification confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyFeeResponse"
        "400":
          description: Payment not found or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TON payment processing not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals/request:
    post:
      operationId: requestWithdrawal
      tags: [withdrawals]
      summary: Request a GC withdrawal (deducts GC, queues payout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestWithdrawalBody"
      responses:
        "200":
          description: Withdrawal queued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestWithdrawalResponse"
        "400":
          description: Validation error (min amount, insufficient balance, weekly cap)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Identity verification required before withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Daily payout cap reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals/{telegramId}:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: Get withdrawal history and weekly cap status for a user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Withdrawal history with weekly remaining data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalsHistoryResponse"

  /withdrawals/{id}/status:
    patch:
      operationId: updateWithdrawalStatus
      tags: [withdrawals]
      summary: Update withdrawal status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWithdrawalStatusBody"
      responses:
        "200":
          description: Withdrawal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalEntry"
        "404":
          description: Withdrawal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rewards/daily:
    post:
      operationId: claimDailyReward
      tags: [rewards]
      summary: Claim daily login reward in Trade Credits (streak-based)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyRewardBody"
      responses:
        "200":
          description: Daily reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardResponse"
        "400":
          description: Already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{telegramId}/referrals:
    get:
      operationId: getReferralStats
      tags: [users]
      summary: Get referral count and pending GC earnings for a user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStatsResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gems/purchase:
    post:
      operationId: purchaseGem
      tags: [gems]
      summary: Purchase a gem powerup with GC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseGemBody"
      responses:
        "201":
          description: Gem purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseGemResponse"
        "400":
          description: Insufficient GC or invalid gem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: VIP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gems/{telegramId}/active:
    get:
      operationId: getActiveGems
      tags: [gems]
      summary: Get all active powerup gems for a user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of active gems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GemItem"

  /content/submit:
    post:
      operationId: submitContent
      tags: [content]
      summary: Submit a content post URL for VIP reward review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitContentBody"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentSubmission"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: VIP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/{telegramId}:
    get:
      operationId: getContentSubmissions
      tags: [content]
      summary: Get all content submissions for a user
      parameters:
        - in: path
          name: telegramId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentSubmission"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterUserBody:
      type: object
      properties:
        telegramId:
          type: string
        username:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]
      required:
        - telegramId

    UpdateWalletBody:
      type: object
      properties:
        walletAddress:
          type: string
      required:
        - walletAddress

    ActivateVipTrialBody:
      type: object
      properties:
        reason:
          type: string
          enum: [tc_zero, gc_milestone, referral]
      required:
        - reason

    UpgradeToVipBody:
      type: object
      properties:
        plan:
          type: string
          enum: [weekly, monthly, tc]
        senderAddress:
          type: ["string", "null"]
          description: "The sender's TON wallet address (user-friendly or raw). Used to locate the on-chain payment transaction."
      required:
        - plan

    User:
      type: object
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        tradeCredits:
          type: integer
        goldCoins:
          type: integer
        totalGcEarned:
          type: integer
        isVip:
          type: boolean
        day7BonusClaimed:
          type: boolean
          description: "True once the Day-7 survivor bonus (+3000 TC) has been awarded; decoupled from hadVipTrial"
        gcMilestoneTrialClaimed:
          type: boolean
          description: "True once the GC-milestone trial (goldCoins >= 5000) has been granted; prevents re-claiming"
        referralVipRewardPending:
          type: boolean
          description: "Set to true when a user this person referred purchases VIP; cleared after trial is activated"
        vipPlan:
          type: ["string", "null"]
          description: "Active VIP plan identifier: ton_weekly, ton_monthly, tc_weekly, or null"
        vipExpiresAt:
          type: ["string", "null"]
        vipTrialExpiresAt:
          type: ["string", "null"]
        hasVerified:
          type: boolean
        walletAddress:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]
        loginStreak:
          type: integer
        lastLoginDate:
          type: ["string", "null"]
        registrationDate:
          type: ["string", "null"]
        dailyGcEarned:
          type: integer
        dailyGcDate:
          type: ["string", "null"]
        weeklyWithdrawnGc:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - telegramId
        - tradeCredits
        - goldCoins
        - totalGcEarned
        - isVip
        - hasVerified
        - loginStreak
        - dailyGcEarned
        - weeklyWithdrawnGc
        - createdAt

    UserStats:
      type: object
      properties:
        totalPredictions:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRate:
          type: number
        totalTcWagered:
          type: integer
        totalGcEarned:
          type: integer
        referralCount:
          type: integer
        rank:
          type: integer
      required:
        - totalPredictions
        - wins
        - losses
        - winRate
        - totalTcWagered
        - totalGcEarned
        - referralCount
        - rank

    CreatePredictionBody:
      type: object
      properties:
        telegramId:
          type: string
        direction:
          type: string
          enum: [long, short]
        amount:
          type: integer
        entryPrice:
          type: number
        duration:
          type: integer
          description: "Round duration in seconds. Allowed: 60."
          enum: [60]
          default: 60
        multiplier:
          type: number
          description: "GC payout multiplier for the selected tier (+ optional VIP bonus). Validated server-side against the duration."
          default: 1.85
      required:
        - telegramId
        - direction
        - amount
        - entryPrice

    ResolvePredictionBody:
      type: object
      properties:
        exitPrice:
          type: number
      required:
        - exitPrice

    Prediction:
      type: object
      properties:
        id:
          type: integer
        telegramId:
          type: string
        direction:
          type: string
        amount:
          type: integer
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, won, lost]
        payout:
          type: ["integer", "null"]
        duration:
          type: integer
          description: "Round duration in seconds used for this prediction."
        multiplier:
          type: number
          description: "GC payout multiplier applied to the winning bet for this prediction."
        autoResolved:
          type: boolean
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]
      required:
        - id
        - telegramId
        - direction
        - amount
        - entryPrice
        - status
        - autoResolved
        - createdAt

    LeaderboardEntry:
      type: object
      properties:
        telegramId:
          type: string
        username:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        goldCoins:
          type: integer
        totalGcEarned:
          type: integer
        isVip:
          type: boolean
        rank:
          type: integer
      required:
        - telegramId
        - goldCoins
        - totalGcEarned
        - isVip
        - rank

    Quest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        externalUrl:
          type: string
        category:
          type: string
        isVipOnly:
          type: boolean
        iconName:
          type: string
      required:
        - id
        - title
        - description
        - reward
        - externalUrl
        - category
        - isVipOnly
        - iconName

    ClaimQuestBody:
      type: object
      properties:
        telegramId:
          type: string
      required:
        - telegramId

    ClaimQuestResponse:
      type: object
      properties:
        tcAwarded:
          type: integer
        newTcBalance:
          type: integer
        message:
          type: string
      required:
        - tcAwarded
        - newTcBalance
        - message

    DailyRewardBody:
      type: object
      properties:
        telegramId:
          type: string
      required:
        - telegramId

    DailyRewardResponse:
      type: object
      properties:
        tcAwarded:
          type: integer
        newTcBalance:
          type: integer
        streak:
          type: integer
        message:
          type: string
        isVipBonus:
          type: boolean
      required:
        - tcAwarded
        - newTcBalance
        - streak
        - message
        - isVipBonus

    WatchAdBody:
      type: object
      properties:
        telegramId:
          type: string
      required:
        - telegramId

    VipActivityItem:
      type: object
      properties:
        displayName:
          type: string
        payout:
          type: integer
        resolvedAt:
          type: string
      required:
        - displayName
        - payout
        - resolvedAt

    GetVipActivityResponse:
      type: array
      items:
        $ref: "#/components/schemas/VipActivityItem"

    AdStatusResponse:
      type: object
      properties:
        adsWatchedToday:
          type: integer
        dailyCap:
          type: integer
      required:
        - adsWatchedToday
        - dailyCap

    WatchAdResponse:
      type: object
      properties:
        tcAwarded:
          type: integer
        newTcBalance:
          type: integer
        adsWatchedToday:
          type: integer
        dailyCap:
          type: integer
        message:
          type: string
      required:
        - tcAwarded
        - newTcBalance
        - adsWatchedToday
        - dailyCap
        - message

    RequestWithdrawalBody:
      type: object
      properties:
        telegramId:
          type: string
        gcAmount:
          type: integer
          description: "Amount of Gold Coins to withdraw"
        usdtWallet:
          type: string
          description: "USDT TRC-20 wallet address for payout"
      required:
        - telegramId
        - gcAmount
        - usdtWallet

    VerifyFeeBody:
      type: object
      properties:
        telegramId:
          type: string
        senderAddress:
          type: string
          description: "TON wallet address of the sender"
      required:
        - telegramId
        - senderAddress

    VerifyFeeResponse:
      type: object
      properties:
        success:
          type: boolean
        alreadyVerified:
          type: boolean
      required:
        - success
        - alreadyVerified

    WithdrawalsHistoryResponse:
      type: object
      properties:
        withdrawals:
          type: array
          items:
            $ref: "#/components/schemas/WithdrawalEntry"
        weeklyRemainingGc:
          type: integer
        weeklyMaxGc:
